          <nav class="bg-white dark:bg-gray-900 shadow px-6 py-4 flex items-center justify-between">

 <!-- MAIN -->
    
     <section class="flex justify-between items-center mb-20 m-6">
        <div>
                <h1 class="text-2xl font-bold mb-2 ml-0">Budget planner</h1>
                <p class="text-gray-600 mt-0 ">Set spending limits and track actual vs budget, live from transactions</p>
            </div>
            <div>
                <p class="inline bg-white p-2 rounded shadow text-gray-700">📅June 2026</p>
             </div>

<div class="container">

    <h1>Set budget</h1>

    <input type="text" id="category" placeholder="Category">

    <button onclick="addBudget()">Add Budget</button>

    <table>
        <thead>
            <tr>
                <th>Category</th>
                <th>Budget</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="budgetTable">
        </tbody>

    <div id="totalBudget">
