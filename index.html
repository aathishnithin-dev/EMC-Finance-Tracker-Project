<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            income: '#22c55e',
            expense: '#ef4444',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-800 dark:text-gray-100 min-h-screen">

  <!-- ─── NAVBAR ─────────────────────────────────────── -->
  <nav class="bg-white dark:bg-gray-900 shadow px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold text-indigo-600">💰 FinanceTracker</h1>
    <div class="flex gap-6 text-sm font-medium">
      <a href="index.html"        class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Dashboard</a>
      <a href="transactions.html" class="hover:text-indigo-500">Transactions</a>
      <a href="budget.html"       class="hover:text-indigo-500">Budget</a>
      <a href="reports.html"      class="hover:text-indigo-500">Reports</a>
      <a href="settings.html"     class="hover:text-indigo-500">Settings</a>
    </div>
  </nav>

  <!-- ─── MAIN CONTENT ──────────────────────────────── -->
  <main class="max-w-5xl mx-auto px-6 py-8">

    <!-- Welcome -->
    <div class="mb-6">
      <h2 class="text-2xl font-bold" id="welcome-msg">Welcome back 👋</h2>
      <p class="text-gray-500 text-sm mt-1">Here's your financial overview</p>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">

      <!-- Balance Card -->
      <div class="bg-indigo-600 text-white rounded-2xl p-5 shadow">
        <p class="text-sm opacity-80">Total Balance</p>
        <p class="text-3xl font-bold mt-1" id="total-balance">₹0</p>
      </div>

      <!-- Income Card -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow border-l-4 border-green-500">
        <p class="text-sm text-gray-500">Total Income</p>
        <p class="text-2xl font-bold text-green-500 mt-1" id="total-income">₹0</p>
      </div>

      <!-- Expense Card -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow border-l-4 border-red-500">
        <p class="text-sm text-gray-500">Total Expense</p>
        <p class="text-2xl font-bold text-red-500 mt-1" id="total-expense">₹0</p>
      </div>

    </div>

    <!-- Quick Add Button -->
    <div class="mb-6">
      <a href="transactions.html"
         class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-5 py-2 rounded-xl transition">
        + Add Transaction
      </a>
    </div>

    <!-- Recent Transactions -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-5">
      <h3 class="text-lg font-semibold mb-4">Recent Transactions</h3>
      <ul id="recent-list" class="divide-y divide-gray-100 dark:divide-gray-700">
        <!-- JS will inject last 5 transactions here -->
        <li class="text-gray-400 text-sm py-3">No transactions yet.</li>
      </ul>
      <a href="transactions.html" class="text-indigo-500 text-sm mt-4 inline-block hover:underline">
        View all →
      </a>
    </div>

  </main>

  <!-- ─── SCRIPTS ────────────────────────────────────── -->
  <script src="utils.js"></script>
  <script>
    // Apply saved theme on load
    applyTheme();

    // Set welcome name
    const { name } = getSettings();
    document.getElementById('welcome-msg').textContent = `Welcome back, ${name} 👋`;

    // Summary cards
    document.getElementById('total-balance').textContent  = formatAmount(getBalance());
    document.getElementById('total-income').textContent   = formatAmount(getTotalIncome());
    document.getElementById('total-expense').textContent  = formatAmount(getTotalExpense());

    // Recent 5 transactions
    const recent = getTransactions().slice(-5).reverse();
    const list   = document.getElementById('recent-list');

    if (recent.length > 0) {
      list.innerHTML = recent.map(t => `
        <li class="flex justify-between items-center py-3">
          <div>
            <p class="font-medium text-sm">${t.category}</p>
            <p class="text-xs text-gray-400">${t.date} · ${t.note || '—'}</p>
          </div>
          <span class="font-semibold text-sm ${t.type === 'income' ? 'text-green-500' : 'text-red-500'}">
            ${t.type === 'income' ? '+' : '-'}${formatAmount(t.amount)}
          </span>
        </li>
      `).join('');
    }
  </script>

</body>
</html>
