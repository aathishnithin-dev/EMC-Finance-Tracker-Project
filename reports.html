<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker — Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-800 dark:text-gray-100 min-h-screen">

  <!-- ─── NAVBAR ─────────────────────────────────────── -->
  <nav class="bg-white dark:bg-gray-900 shadow px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold text-indigo-600">💰 FinanceTracker</h1>
    <div class="flex gap-6 text-sm font-medium">
      <a href="index.html"        class="hover:text-indigo-500">Dashboard</a>
      <a href="transactions.html" class="hover:text-indigo-500">Transactions</a>
      <a href="budget.html"       class="hover:text-indigo-500">Budget</a>
      <a href="reports.html"      class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Reports</a>
      <a href="settings.html"     class="hover:text-indigo-500">Settings</a>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-8">

    <h2 class="text-2xl font-bold mb-2">Reports & Analytics</h2>
    <p class="text-gray-500 text-sm mb-6">Visual breakdown of your finances</p>

    <!-- ─── DATE FILTER ───────────────────────────────── -->
    <div class="flex gap-3 mb-8">
      <button onclick="setFilter('week')"   id="btn-week"
              class="filter-btn px-4 py-1.5 rounded-full text-sm border border-gray-300 dark:border-gray-600 hover:bg-indigo-50 dark:hover:bg-gray-800">
        This Week
      </button>
      <button onclick="setFilter('month')"  id="btn-month"
              class="filter-btn px-4 py-1.5 rounded-full text-sm border border-indigo-600 bg-indigo-600 text-white">
        This Month
      </button>
      <button onclick="setFilter('all')"    id="btn-all"
              class="filter-btn px-4 py-1.5 rounded-full text-sm border border-gray-300 dark:border-gray-600 hover:bg-indigo-50 dark:hover:bg-gray-800">
        All Time
      </button>
    </div>

    <!-- ─── STAT CARDS ────────────────────────────────── -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow text-center">
        <p class="text-sm text-gray-500 mb-1">Top Spending Category</p>
        <p class="text-xl font-bold text-red-500" id="top-category">—</p>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow text-center">
        <p class="text-sm text-gray-500 mb-1">Total Transactions</p>
        <p class="text-xl font-bold text-indigo-500" id="total-count">0</p>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow text-center">
        <p class="text-sm text-gray-500 mb-1">Avg. Daily Expense</p>
        <p class="text-xl font-bold text-yellow-500" id="avg-daily">₹0</p>
      </div>
    </div>

    <!-- ─── CHARTS ────────────────────────────────────── -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

      <!-- Pie Chart -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-5">
        <h3 class="font-semibold mb-4 text-sm">Expense by Category</h3>
        <div id="pie-empty" class="hidden text-center text-gray-400 text-sm py-10">No expense data yet.</div>
        <canvas id="pie-chart" height="220"></canvas>
      </div>

      <!-- Bar Chart -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-5">
        <h3 class="font-semibold mb-4 text-sm">Income vs Expense (by Month)</h3>
        <div id="bar-empty" class="hidden text-center text-gray-400 text-sm py-10">No data yet.</div>
        <canvas id="bar-chart" height="220"></canvas>
      </div>

    </div>

  </main>

  <!-- ─── SCRIPTS ───────────────────────────────────────── -->
  <script src="utils.js"></script>
  <script>
    applyTheme();

    let pieChart = null;
    let barChart = null;
    let currentFilter = 'month';

    // Filter buttons
    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.className = b.className
          .replace('bg-indigo-600 text-white border-indigo-600', '')
          + ' border-gray-300 dark:border-gray-600';
      });
      const active = document.getElementById('btn-' + f);
      active.className = active.className
        .replace('border-gray-300 dark:border-gray-600', '')
        + ' border-indigo-600 bg-indigo-600 text-white';
      renderReports();
    }

    // Filter transactions by date range
    function filterByDate(txns) {
      const now   = new Date();
      return txns.filter(t => {
        const d = new Date(t.date);
        if (currentFilter === 'week') {
          const weekAgo = new Date(now);
          weekAgo.setDate(now.getDate() - 7);
          return d >= weekAgo;
        } else if (currentFilter === 'month') {
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }
        return true; // all
      });
    }

    function renderReports() {
      const all      = filterByDate(getTransactions());
      const expenses = all.filter(t => t.type === 'expense');
      const incomes  = all.filter(t => t.type === 'income');

      // Stat cards
      // Top category
      const catTotals = {};
      expenses.forEach(t => { catTotals[t.category] = (catTotals[t.category] || 0) + t.amount; });
      const topCat = Object.entries(catTotals).sort((a, b) => b[1] - a[1])[0];
      document.getElementById('top-category').textContent = topCat ? `${topCat[0]} (${formatAmount(topCat[1])})` : '—';
      document.getElementById('total-count').textContent  = all.length;

      // Avg daily expense
      const days    = currentFilter === 'week' ? 7 : currentFilter === 'month' ? 30 : 365;
      const totalEx = expenses.reduce((s, t) => s + t.amount, 0);
      document.getElementById('avg-daily').textContent = formatAmount(Math.round(totalEx / Math.max(days, 1)));

      // ── Pie Chart ──
      const pieCanvas = document.getElementById('pie-chart');
      const pieEmpty  = document.getElementById('pie-empty');

      if (pieChart) { pieChart.destroy(); pieChart = null; }

      if (expenses.length === 0) {
        pieCanvas.classList.add('hidden');
        pieEmpty.classList.remove('hidden');
      } else {
        pieCanvas.classList.remove('hidden');
        pieEmpty.classList.add('hidden');
        const labels = Object.keys(catTotals);
        const values = Object.values(catTotals);
        const colors = ['#6366f1','#22c55e','#ef4444','#f59e0b','#06b6d4','#ec4899','#a855f7','#84cc16'];
        pieChart = new Chart(pieCanvas, {
          type: 'doughnut',
          data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length), borderWidth: 2 }] },
          options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }, cutout: '60%' }
        });
      }

      // ── Bar Chart (income vs expense by month) ──
      const barCanvas = document.getElementById('bar-chart');
      const barEmpty  = document.getElementById('bar-empty');

      if (barChart) { barChart.destroy(); barChart = null; }

      const monthMap = {};
      getTransactions().forEach(t => {
        const key = t.date.slice(0, 7); // YYYY-MM
        if (!monthMap[key]) monthMap[key] = { income: 0, expense: 0 };
        monthMap[key][t.type] += t.amount;
      });

      const sortedMonths = Object.keys(monthMap).sort();
      if (sortedMonths.length === 0) {
        barCanvas.classList.add('hidden');
        barEmpty.classList.remove('hidden');
      } else {
        barCanvas.classList.remove('hidden');
        barEmpty.classList.add('hidden');
        barChart = new Chart(barCanvas, {
          type: 'bar',
          data: {
            labels: sortedMonths,
            datasets: [
              { label: 'Income',  data: sortedMonths.map(m => monthMap[m].income),  backgroundColor: '#22c55e' },
              { label: 'Expense', data: sortedMonths.map(m => monthMap[m].expense), backgroundColor: '#ef4444' }
            ]
          },
          options: {
            plugins: { legend: { position: 'bottom' } },
            scales: { y: { beginAtZero: true, ticks: { font: { size: 11 } } } }
          }
        });
      }
    }

    renderReports();
  </script>

</body>
</html>
